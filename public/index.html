<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GLM-5.2 Streaming </title>
</head>
<body>
  <h1>Ask GLM‑5.2 Model</h1>
  <textarea id="prompt" rows="4" cols="50"></textarea><br>
  <button onclick="sendPrompt()">Send</button>
  <div id="output" style="overflow-y:visible; background:#fafafa; border:1px solid #ccc; padding:10px;"></div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <script>
    async function sendPrompt() {
      const prompt = document.getElementById("prompt").value;
      const output = document.getElementById("output");
      output.textContent = "";

      try {
        const response = await fetch("https://personal-ai-glm-5-2.vercel.app/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "z-ai/glm-5.2",
            messages: [{ role: "user", content: prompt }],
            temperature: 1,
            top_p: 1,
            max_tokens: 16384,   // smaller for faster replies
            seed: 42,
            stream: true
          })
        });

        if (!response.ok) {
          throw new Error(`HTTP error! Status: ${response.status}`);
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let buffer = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          const chunk = decoder.decode(value, { stream: true });
          chunk.split("\n").forEach(line => {
            if (line.startsWith("data: ")) {
              const data = line.slice(6);
              if (data === "[DONE]") return;
              try {
                const parsed = JSON.parse(data);
                if (parsed.choices && parsed.choices[0].delta?.content) {
                  /** output.textContent += parsed.choices[0].delta.content;*/
                  buffer += parsed.choices[0].delta.content;
                }
              } catch (err) {
                console.warn("Non-JSON chunk:", data);
              }
            }
          });
        }

        // Typing effect
        const typingDelay = 10;
        let i = 0;
        output.textContent = "";
        
        const interval = setInterval(() => {
            i++;
            const partial = buffer.slice(0, i);
            output.innerHTML = marked.parse(partial);

             // Auto-scroll the whole page
            window.scrollTo({
              top: document.body.scrollHeight,
              behavior: "smooth"
            });

            if (i >= buffer.length) {
                clearInterval(interval);
            }
        }, typingDelay);


      } catch (err) {
        output.textContent = `❌ Error: ${err.message}`;
        console.error("Frontend error:", err);
      }
    }
  </script>
</body>
</html>
