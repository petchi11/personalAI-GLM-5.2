<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GLM-5.2 Streaming </title>
  <style>
    .loader-container {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 10px 0;
    }

    .dots {
      display: flex;
      gap: 5px;
    }

    .dot {
      width: 8px;
      height: 8px;
      background-color: #666;
      border-radius: 50%;
      animation: bounce 0.6s infinite alternate;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      from { transform: translateY(0); opacity: 0.5; }
      to   { transform: translateY(-6px); opacity: 1; }
    }

    .thinking-text {
      font-style: italic;
      color: #555;
      font-size: 14px;
    }
  </style>

</head>
<body>
  <h1>Ask GLM‑5.2 Model</h1>
  <textarea id="prompt" rows="4" cols="50"></textarea><br>
  <button onclick="sendPrompt()">Send</button>
  
  <div id="loader" style="display:none;" class="loader-container">
    <div class="dots">
     <span class="dot"></span>
     <span class="dot"></span>
     <span class="dot"></span>
    </div>
    <span class="thinking-text">Thinking...</span>
  </div>

<div id="output"
    style="display:none; overflow-y:visible; background:#fafafa;
    border:1px solid #ccc; padding:10px;"></div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <script>
    const loader = document.getElementById("loader");

    async function sendPrompt() {
      const prompt = document.getElementById("prompt").value;
      const output = document.getElementById("output");
      output.textContent = "";
      output.style.display = "none"; // hide output initially
      loader.style.display = "flex"; // show loader
      
      try {
        const response = await fetch("https://personal-ai-glm-5-2.vercel.app/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "z-ai/glm-5.2",
            messages: [{ role: "user", content: prompt }],
            temperature: 1,
            top_p: 1,
            max_tokens: 16384,   // smaller for faster replies
            seed: 42,
            stream: true
          })
        });

        if (!response.ok) {
          throw new Error(`HTTP error! Status: ${response.status}`);
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let buffer = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          const chunk = decoder.decode(value, { stream: true });
          chunk.split("\n").forEach(line => {
            if (line.startsWith("data: ")) {
              const data = line.slice(6);
              if (data === "[DONE]") return;
              try {
                const parsed = JSON.parse(data);
                if (parsed.choices && parsed.choices[0].delta?.content) {
                  /** output.textContent += parsed.choices[0].delta.content;*/
                  buffer += parsed.choices[0].delta.content;
                }
              } catch (err) {
                console.warn("Non-JSON chunk:", data);
              }
            }
          });
        }

        loader.style.display = "none"; // hide loader once response starts typing
        output.style.display = "block"; // show output when typing starts

        // Typing effect
        const typingDelay = 10;
        let i = 0;
        output.textContent = "";
        
        const interval = setInterval(() => {
            i++;
            const partial = buffer.slice(0, i);
            output.innerHTML = marked.parse(partial);

             // Auto-scroll the whole page
            // Check if user is near the bottom of the page
            const isNearBottom = window.innerHeight + window.scrollY >= document.body.scrollHeight - 20;

            if (isNearBottom) {
              window.scrollTo({
                top: document.body.scrollHeight,
                behavior: "smooth"
              });
            }


            if (i >= buffer.length) {
                clearInterval(interval);
            }
        }, typingDelay);


      } catch (err) {
        loader.style.display = "none";
        output.style.display = "block";
        output.textContent = `❌ Error: ${err.message}`;
        console.error("Frontend error:", err);
      }
    }
  </script>
</body>
</html>
